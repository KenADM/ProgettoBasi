services:
  # Servizio 1: Il generatore di dati in Python
  generatore:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: python_generatore
    volumes:
      # Colleghiamo i file sorgente .txt al container Python
      - ./data:/data
      # Colleghiamo la cartella sql in modo che Python possa scriverci dentro
      - ./sql:/output

  # Servizio 2: Il Database Postgres
  db:
    image: postgres:15-alpine
    container_name: ${PG_CONTAINER_NAME}
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Colleghiamo la cartella sql locale a quella di avvio automatico di Postgres
      - ./sql:/docker-entrypoint-initdb.d/
    depends_on:
      generatore:
        condition: service_completed_successfully

volumes:
  postgres_data: